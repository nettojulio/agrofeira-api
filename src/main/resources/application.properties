spring.application.name=agrofeira
spring.profiles.active=dev
server.port=8080
# Application Properties
app.frontend.url=${FRONTEND_URL:https://agrofeira.ufape.edu.br}
# JWT Security
jwt.secret=${JWT_SECRET:ecofeira-secret-key-must-be-at-least-256-bits-long}
jwt.access.expiration=900000
jwt.refresh.expiration=604800000
jwt.reset.expiration=3600000
# Mail Security (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:lmts@ufape.edu.br}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000