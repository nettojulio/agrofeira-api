name: CI - Agro Feira API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: ☕ Configurar o Java 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Garantir permissão de execução do Maven Wrapper
        run: chmod +x mvnw

      - name: Validar, Compilar e Testar (Unitários e Integração)
        run: ./mvnw clean verify

      - name: Upload de relatórios de erro (testes falharam)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: relatorios-testes-surefire
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload do Relatório de Cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14
